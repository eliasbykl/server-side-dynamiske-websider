<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skuespillere</title>
</head>

<body>
    <h1>Skuespillere</h1>
    <ul id="liste"></ul>

    <h2>Legg til ny skuespiller</h2>
    <input type="text" id="navn" placeholder="Navn på ny skuespiller">
    <button onclick="sendData()">Legg til</button>

    <script>
        function hentData() {
            fetch('/skuespillere-json')
                .then(res => res.json())
                .then(data => {
                    const liste = document.getElementById('liste');
                    liste.innerHTML = '';
                    for (const skuespiller of data) {
                        const li = document.createElement('li');
                        li.textContent = skuespiller.navn;
                        liste.appendChild(li);
                    }
                })
                .catch(err => console.error('Feil ved henting av skuespillere:', err));
        }

        function sendData() {
            const navn = document.getElementById('navn').value;
            fetch('/legg-til-skuespiller', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ navn: navn })
            })
                .then(res => res.json())
                .then(data => {
                    console.log('Lagret:', data);
                    document.getElementById('navn').value = '';
                    hentData();
                })
                .catch(err => console.error('Feil ved sending av data:', err));
        }

        // Last inn skuespillere når siden åpnes
        hentData();
    </script>
</body>

</html>
